# Ruff configuration for superPENTESTING
# Keeping a standalone ruff.toml helps tooling that doesn't fully support
# reading Ruff config from pyproject.toml.

target-version = "py311"
line-length = 100

# Exclude common build/virtualenv/cache directories
exclude = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".tox",
  ".venv",
  "venv",
  "env",
  "build",
  "dist",
]

[lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
  "E501", # line length handled by formatter; keep dev ergonomics
]

# Allow unused imports in package __init__ modules for re-export patterns
per-file-ignores = { "__init__.py" = ["F401"] }

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
